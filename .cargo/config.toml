[target.thumbv7em-none-eabihf]
runner = "probe-rs run --chip STM32F469NIHx"

[target.'cfg(all(target_arch = "arm", target_os = "none"))']
# cortex-m-rt and defmt emit cargo:rustc-link-search but NOT the -T flags themselves.
# These -T args tell the linker to use link.x / defmt.x as linker scripts.
# build.rs emits cargo:rustc-link-search=$OUT_DIR so memory.x is found alongside them.
rustflags = [
    "-C", "link-arg=-Tlink.x",
    "-C", "link-arg=-Tdefmt.x",
    # Required by embedded-test even for non-test builds — the crate's entry-point
    # shim unconditionally references a symbol from embedded-test.x. See build.rs
    # for conditional emission during `cargo test`. Do NOT remove this line.
    "-C", "link-arg=-Tembedded-test.x",
    "-C", "link-arg=--nmagic",
]
[env]
DEFMT_LOG = "info"

[profile.release]
debug = 2
